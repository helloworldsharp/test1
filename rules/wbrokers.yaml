# IBKR + Charles Schwab / thinkorswim
# Clash / Mihomo / Stash classical rule-provider
# Updated: 2026-07-21
# Scope: IBKR and Charles Schwab services used by this configuration;
# this is not intended to cover every overseas broker.
#
# Reference sources:
# https://github.com/jtzhpf/USTC-rules/blob/main/broker.list
# https://github.com/ZanwingMak/diversion-rules/blob/master/rule/Securities/OverseasBrokers.list
#
# Cross-check references:
# https://github.com/v2fly/domain-list-community/blob/master/data/ibkr
# https://github.com/v2fly/domain-list-community/blob/master/data/schwab
#
# Deliberately excluded:
# - shared third-party services such as launchdarkly.com, go-mpulse.net,
#   zacks.com and trefis.com
# - broad DOMAIN-KEYWORD, USER-AGENT and PROCESS-NAME rules
# - redundant exact subdomains already covered by DOMAIN-SUFFIX

